<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAT Vocab Study</title>
    <style>
        :root {
            --primary: #4a90e2;
            --bg: #f4f7f6;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: var(--text);
        }

        h1 { margin-bottom: 20px; color: var(--primary); }

        /* Flashcard Container */
        .card-container {
            width: 350px;
            height: 250px;
            perspective: 1000px;
            cursor: pointer;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 15px;
        }

        .card.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            border-radius: 15px;
            background: white;
            text-align: center;
        }

        .card-back {
            transform: rotateY(180deg);
            background: #fff;
            border: 2px solid var(--primary);
        }

        .word { font-size: 2rem; font-weight: bold; color: var(--primary); }
        .pos { font-style: italic; color: #666; margin-bottom: 10px; }
        .definition { font-size: 1.1rem; line-height: 1.4; }

        /* Controls */
        .controls { margin-top: 30px; }
        
        button {
            padding: 12px 25px;
            font-size: 1rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }
        .hint { margin-top: 15px; font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>

    <h1>SAT Flashcards</h1>

    <div class="card-container" onclick="flipCard()">
        <div class="card" id="card">
            <div class="card-face card-front">
                <div class="word" id="word-display">Loading...</div>
                <div class="pos" id="pos-display">adj.</div>
            </div>
            <div class="card-face card-back">
                <div class="definition" id="def-display">Definition goes here.</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button onclick="nextWord(event)">Next Word &rarr;</button>
    </div>

    <div class="hint">Click the card to see the definition</div>

    <script>
        const vocab = [
            { word: "Abate", pos: "v.", def: "To become less active, less intense, or less in amount." },
            { word: "Adroit", pos: "adj.", def: "Skillful or clever in using the hands or mind." },
            { word: "Anomalous", pos: "adj.", def: "Deviating from what is standard, normal, or expected." },
            { word: "Capricious", pos: "adj.", def: "Given to sudden and unaccountable changes of mood or behavior." },
            { word: "Diligent", pos: "adj.", def: "Having or showing care and conscientiousness in one's work." },
            { word: "Ephemeral", pos: "adj.", def: "Lasting for a very short time." },
            { word: "Pragmatic", pos: "adj.", def: "Dealing with things sensibly and realistically; practical." },
            { word: "Scrutinize", pos: "v.", def: "To examine or inspect closely and thoroughly." }
        ];

        let currentIndex = 0;
        const card = document.getElementById('card');
        const wordEl = document.getElementById('word-display');
        const posEl = document.getElementById('pos-display');
        const defEl = document.getElementById('def-display');

        function updateCard() {
            const item = vocab[currentIndex];
            wordEl.textContent = item.word;
            posEl.textContent = item.pos;
            defEl.textContent = item.def;
        }

        function flipCard() {
            card.classList.toggle('is-flipped');
        }

        function nextWord(event) {
            event.stopPropagation(); // Prevents flipping when clicking the button
            
            // If card is flipped, flip it back first
            if (card.classList.contains('is-flipped')) {
                card.classList.remove('is-flipped');
                // Wait for flip-back animation to finish before changing text
                setTimeout(() => {
                    currentIndex = (currentIndex + 1) % vocab.length;
                    updateCard();
                }, 300);
            } else {
                currentIndex = (currentIndex + 1) % vocab.length;
                updateCard();
            }
        }

        // Initialize
        updateCard();
    </script>
</body>
</html>
