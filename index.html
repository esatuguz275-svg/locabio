<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAT Mastery | Study Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; /* Modern Indigo */
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Progress Header */
        .header {
            width: 100%;
            max-width: 400px;
            margin-bottom: 30px;
            text-align: center;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: var(--primary);
            transition: width 0.4s ease;
        }

        /* Flashcard Styling */
        .card-container {
            width: 100%;
            max-width: 400px;
            height: 280px;
            perspective: 1000px;
            cursor: pointer;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            box-sizing: border-box;
            border-radius: 24px;
            background: var(--card-bg);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            text-align: center;
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .card-back {
            transform: rotateY(180deg);
            background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);
        }

        .word { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.025em; color: var(--primary); }
        .pos { color: var(--text-sub); font-weight: 600; margin-top: 8px; text-transform: uppercase; font-size: 0.8rem; }
        .definition { font-size: 1.2rem; line-height: 1.6; color: var(--text-main); font-weight: 500; }

        /* Controls */
        .controls {
            margin-top: 40px;
            display: flex;
            gap: 15px;
        }

        button {
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 600;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.4);
            transition: all 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.5);
        }

        button:active { transform: translateY(0); }

        .hint { margin-top: 20px; font-size: 0.85rem; color: var(--text-sub); }
    </style>
</head>
<body>

    <div class="header">
        <div id="counter">Word 1 of 8</div>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <div class="card-container" onclick="flipCard()">
        <div class="card" id="card">
            <div class="card-face card-front">
                <div class="word" id="word-display">Loading...</div>
                <div class="pos" id="pos-display">...</div>
            </div>
            <div class="card-face card-back">
                <div class="definition" id="def-display">...</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button onclick="nextWord(event)">Next Word</button>
    </div>

    <div class="hint">Tap the card to reveal the definition</div>

    <script>
        const vocab = [
            { word: "Abate", pos: "verb", def: "To become less active, less intense, or less in amount." },
            { word: "Adroit", pos: "adj.", def: "Skillful or clever in using the hands or mind." },
            { word: "Anomalous", pos: "adj.", def: "Deviating from what is standard or expected." },
            { word: "Capricious", pos: "adj.", def: "Given to sudden and unaccountable changes of mood." },
            { word: "Diligent", pos: "adj.", def: "Having or showing care and conscientiousness in work." },
            { word: "Ephemeral", pos: "adj.", def: "Lasting for a very short time." },
            { word: "Pragmatic", pos: "adj.", def: "Dealing with things sensibly and realistically." },
            { word: "Scrutinize", pos: "verb", def: "To examine or inspect closely and thoroughly." }
            { word: "sad", pos: "verb", def: "feeling or showing sorrow; unhappy:." }
        ];

        let currentIndex = 0;
        const card = document.getElementById('card');
        const wordEl = document.getElementById('word-display');
        const posEl = document.getElementById('pos-display');
        const defEl = document.getElementById('def-display');
        const barEl = document.getElementById('progress-bar');
        const counterEl = document.getElementById('counter');

        function updateCard() {
            const item = vocab[currentIndex];
            wordEl.textContent = item.word;
            posEl.textContent = item.pos;
            defEl.textContent = item.def;
            
            // Update Progress
            const progress = ((currentIndex + 1) / vocab.length) * 100;
            barEl.style.width = progress + "%";
            counterEl.textContent = `Word ${currentIndex + 1} of ${vocab.length}`;
        }

        function flipCard() {
            card.classList.toggle('is-flipped');
        }

        function nextWord(event) {
            event.stopPropagation();
            if (card.classList.contains('is-flipped')) {
                card.classList.remove('is-flipped');
                setTimeout(() => {
                    currentIndex = (currentIndex + 1) % vocab.length;
                    updateCard();
                }, 300);
            } else {
                currentIndex = (currentIndex + 1) % vocab.length;
                updateCard();
            }
        }

        updateCard();
    </script>
</body>
</html>
